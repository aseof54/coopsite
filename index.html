<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Land</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="page">

        <div class="logo">
            <span>Figma L</span>
            <span class="logo-mark" aria-hidden="true"></span>
            <span>nd</span>
        </div>

        <section class="hero" aria-label="Hero">
            <h1>Work at the speed of thought</h1>

            <p class="subtitle">
                "Most calendars are designed for teams. Slate is designed for
                freelancers who want a simple way to plan their schedule."
            </p>

            <div class="actions">
                <a class="button primary" href="#">Try For Free</a>
                <a class="button" href="#">Learn More</a>
            </div>
        </section>

        <section class="showcase" aria-label="Product preview">
            <img class="screens-image"
                 src="https://res.cloudinary.com/dymzw3dji/image/upload/v1779557279/screens_mw9kds.png"
                 alt="Dark product screens preview">
        </section>

    </main>
</body>
</html>
